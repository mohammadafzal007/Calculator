<html>

<head>
    <title>My Calculator</title>

    <link rel="style/css" href="import url('https://fonts.googleapis.com/css?family=Noto+Sans'); ">
    <style>
        * {
            margin: 0;
            padding: 0;
        }


        .container {

            background-color: rgb(0, 140, 255);
            display: grid;
            padding: 0px;
            grid-template-columns: auto auto auto auto;


        }

        .button {
            background-color: #4e4948;
            color: black;
            font-family: sans-serif;
            font-size: 30px;
            width: 25vw;
            height: 10vh;
            transition: all 0.5s;
            border-color: white;

        }

        .button:hover {
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
        }

        .button:focus {
            box-shadow: 0 0 10px 2px #49dc0af6;
            border-radius: 20px;

        }

        .text {
            width: 100%;
            height: 245px;
            border: 5px solid rgb(221, 15, 15);
            text-align: right;
            font-size: 40px;
            background-color: rgb(69, 81, 78);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-top: 0px;

        }

        .text:hover {
            background-color: rgb(118, 172, 169);
        }

        /* .heading {
            text-align: center;
            margin-top: 5px;
            font-size: 50px;
            font-family: monospace;
            font-style: italic;
            font-weight: bold;
            text-decoration: underline;
        } */

        #heading {
            text-align: center;
            text-decoration: underline;
            font-family: cursive;
            padding-top: 0px;
            padding-bottom: 20px;
            background-image: linear-gradient(grey, black);

        }
    </style>
</head>

<body>
    <h1 id="heading">Calculator</h1>
    <form name="form1">
        <input type="text" class="text" id="input" name="input" onkeypress="calc()" onkeydown="calc()">
    </form>
    <div class="container">
        <button class="button " onclick="form1.input.value=''" id="clear">C</button>
        <button class="button " onclick="del()">Del</button>
        <button class="button " onclick="sqr()">x<sup>2</sup></button>
        <button class="button " onclick="sqrt()">&#8730</button>
        <button class="button " onclick="insert(7)" value="7">7</button>
        <button class="button " onclick="insert(8)" value="8">8</button>
        <button class="button " onclick="insert(9)" value="9">9</button>
        <button class="button " onclick="insert('/')" value="/">/</button>
        <button class="button" onclick="insert(4)" value="4">4</button>
        <button class="button " onclick="insert(5)" value="5">5</button>
        <button class="button " onclick="insert(6)" value="6">6</button>
        <button class="button " onclick="insert('*')" value="*">x</button>
        <button class="button " onclick="insert(1)" value="1">1</button>
        <button class="button " onclick="insert(2)" value="2">2</button>
        <button class="button " onclick="insert(3)" value="3">3</button>
        <button class="button " onclick="insert('-')" value="-">-</button>
        <button class="button " onclick="insert('.')" value=".">.</button>
        <button class="button " onclick="insert(0)" value="0">0</button>
        <button class="button " onclick="calc()" value="=">=</button>
        <button class="button " onclick="insert('+')" value="+">+</button>
    </div>
    <script>
        function insert(num) {
            var a = document.getElementById("input");
            a.value = a.value + num;
        }
        function calc() {
            var a = document.form1.input.value;

            document.form1.input.value = eval(a);


        }

        function del() {
            var a = document.form1.input.value;
            document.form1.input.value = a.substring(0, a.length - 1);
        }
        function sqr() {
            var a = document.form1.input.value;
            document.form1.input.value = Math.pow(a, 2);
        }
        function sqrt() {
            var a = document.form1.input.value;
            document.form1.input.value = Math.sqrt(a);

        }
    </script>
</body>

</html>
